name: Auto Main Release Tag

on:
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: auto-main-release-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write

env:
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: core.hooksPath
    GIT_CONFIG_VALUE_0: /dev/null

jobs:
    tag-and-bump:
        name: Tag current main + prepare next patch version
        runs-on: ubuntu-24.04
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Skip release-prep commits
              id: skip
              shell: bash
              run: |
                  set -euo pipefail
                  msg="$(git log -1 --pretty=%B | tr -d '\r')"
                  if [[ "${msg}" == *"[skip ci]"* && "${msg}" == chore\(release\):\ prepare\ v* ]]; then
                    echo "skip=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "skip=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Enforce release automation actor policy
              if: steps.skip.outputs.skip != 'true'
              id: plan
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p artifacts
                  python3 scripts/ci/auto_main_release_plan.py \
                    --repo-root . \
                    --actor "${GITHUB_ACTOR}" \
                    --repository-owner "${GITHUB_REPOSITORY_OWNER}" \
                    --authorized-actors "${{ vars.RELEASE_AUTHORIZED_ACTORS || '' }}" \
                    --output-json artifacts/auto-main-release-plan.json \
                    --output-md artifacts/auto-main-release-plan.md \
                    --fail-on-violation

                  python3 - <<'PY'
                  import json
                  import os
                  from pathlib import Path

                  report = json.loads(Path("artifacts/auto-main-release-plan.json").read_text(encoding="utf-8"))
                  with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                      fh.write(f"current={report['current_version']}\n")
                      fh.write(f"next={report['next_version']}\n")
                      fh.write(f"tag={report['release_tag']}\n")
                      fh.write(f"tag_exists={str(report['tag_exists_on_origin']).lower()}\n")
                      fh.write(f"should_create_tag={str(report['should_create_tag']).lower()}\n")
                      fh.write(f"should_bump_version={str(report['should_bump_version']).lower()}\n")
                      fh.write(f"mode={report['mode']}\n")
                  PY

                  cat artifacts/auto-main-release-plan.md >> "$GITHUB_STEP_SUMMARY"

            - name: Create and push annotated release tag
              if: steps.skip.outputs.skip != 'true' && steps.plan.outputs.should_create_tag == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  tag="${{ steps.plan.outputs.tag }}"

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git tag -a "${tag}" -m "Release ${tag}"
                  git push origin "refs/tags/${tag}"

            - name: Bump Cargo version for next release
              if: steps.skip.outputs.skip != 'true' && steps.plan.outputs.should_bump_version == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  next="${{ steps.plan.outputs.next }}"

                  awk -v new_version="${next}" '
                    BEGIN { in_pkg=0; done=0 }
                    /^\[package\]/ { in_pkg=1 }
                    in_pkg && /^\[/ && $0 !~ /^\[package\]/ { in_pkg=0 }
                    in_pkg && $1 == "version" && done == 0 {
                      sub(/"[^"]+"/, "\"" new_version "\"")
                      done=1
                    }
                    { print }
                  ' Cargo.toml > Cargo.toml.tmp
                  mv Cargo.toml.tmp Cargo.toml

                  awk -v new_version="${next}" '
                    BEGIN { in_pkg=0; zc_pkg=0; done=0 }
                    /^\[\[package\]\]/ { in_pkg=1; zc_pkg=0 }
                    in_pkg && /^name = "topclaw"$/ { zc_pkg=1 }
                    in_pkg && zc_pkg && /^version = "/ && done == 0 {
                      sub(/"[^"]+"/, "\"" new_version "\"")
                      done=1
                    }
                    { print }
                  ' Cargo.lock > Cargo.lock.tmp
                  mv Cargo.lock.tmp Cargo.lock

            - name: Commit and push next-version prep
              if: steps.skip.outputs.skip != 'true' && steps.plan.outputs.should_bump_version == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  next="${{ steps.plan.outputs.next }}"

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add Cargo.toml Cargo.lock
                  if git diff --cached --quiet; then
                    echo "No version changes detected; nothing to commit."
                    exit 0
                  fi

                  git commit -m "chore(release): prepare v${next} [skip ci]"
                  git push origin HEAD:main
