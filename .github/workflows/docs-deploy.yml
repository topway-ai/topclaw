name: Docs Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "CONTRIBUTING*.md"
      - "docs/**"
      - "scripts/ci/docs_*"
      - "scripts/docs/**"
      - ".github/workflows/docs-deploy.yml"
      - ".github/release/docs-deploy-policy.json"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "CONTRIBUTING*.md"
      - "docs/**"
      - "scripts/ci/docs_*"
      - "scripts/docs/**"
      - ".github/workflows/docs-deploy.yml"
      - ".github/release/docs-deploy-policy.json"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "preview or production"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      preview_evidence_run_url:
        description: "Required for manual production promotion when policy requires it"
        required: false
        type: string
      rollback_ref:
        description: "Optional rollback git ref for manual production deploys"
        required: false
        type: string

concurrency:
  group: docs-deploy-${{ github.event_name }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docs-quality:
    name: Docs Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js for markdown lint
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Run docs quality gate
        shell: bash
        run: |
          set -euo pipefail
          docs_files="$(git ls-files '*.md' | tr '\n' ' ')"
          DOCS_FILES="$docs_files" BASE_SHA= bash ./scripts/ci/docs_quality_gate.sh

  deploy-guard:
    name: Docs Deploy Guard
    runs-on: ubuntu-latest
    outputs:
      ready_to_deploy: ${{ steps.guard.outputs.ready_to_deploy }}
      deploy_target: ${{ steps.guard.outputs.deploy_target }}
      deploy_mode: ${{ steps.guard.outputs.deploy_mode }}
      source_ref: ${{ steps.guard.outputs.source_ref }}
      preview_retention_days: ${{ steps.guard.outputs.docs_preview_retention_days }}
      guard_retention_days: ${{ steps.guard.outputs.docs_guard_artifact_retention_days }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Evaluate docs deploy policy
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          python3 ./scripts/ci/docs_deploy_guard.py \
            --repo-root . \
            --event-name "${{ github.event_name }}" \
            --git-ref "${{ github.ref }}" \
            --git-sha "${{ github.sha }}" \
            --input-deploy-target "${{ inputs.deploy_target || '' }}" \
            --input-preview-evidence-run-url "${{ inputs.preview_evidence_run_url || '' }}" \
            --input-rollback-ref "${{ inputs.rollback_ref || '' }}" \
            --policy-file .github/release/docs-deploy-policy.json \
            --output-json docs-deploy-guard.json \
            --output-md docs-deploy-guard.md \
            --github-output-file "$GITHUB_OUTPUT"
      - name: Emit deploy guard audit record
        shell: bash
        run: |
          set -euo pipefail
          cp docs-deploy-guard.json audit-event-docs-deploy-guard.json
      - name: Upload guard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-deploy-guard
          retention-days: ${{ steps.guard.outputs.docs_guard_artifact_retention_days }}
          path: |
            docs-deploy-guard.json
            docs-deploy-guard.md
            audit-event-docs-deploy-guard.json

  build-site:
    name: Build Docs Site
    needs: [docs-quality, deploy-guard]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: "3.12"
      - name: Install docs builder dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check jinja2 markdown-it-py
      - name: Materialize docs source tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .docs-source
          mkdir -p .docs-source
          git archive "${{ needs.deploy-guard.outputs.source_ref }}" | tar -x -C .docs-source
      - name: Build static docs site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf docs-built-site
          python3 ./scripts/docs/build_site.py \
            --repo-root .docs-source \
            --output-dir "$GITHUB_WORKSPACE/docs-built-site" \
            --github-source-base "https://github.com/topway-ai/topclaw/blob/${{ needs.deploy-guard.outputs.source_ref }}"
      - name: Upload preview artifact
        if: needs.deploy-guard.outputs.deploy_target == 'preview'
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          retention-days: ${{ needs.deploy-guard.outputs.preview_retention_days }}
          path: docs-built-site
      - name: Upload Pages artifact
        if: needs.deploy-guard.outputs.deploy_target == 'production' && needs.deploy-guard.outputs.ready_to_deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-built-site

  deploy-pages:
    name: Deploy Docs to GitHub Pages
    needs: [deploy-guard, build-site]
    if: needs.deploy-guard.outputs.deploy_target == 'production' && needs.deploy-guard.outputs.ready_to_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
